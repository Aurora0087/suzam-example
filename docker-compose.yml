services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: suzam
      POSTGRES_PASSWORD: suzam
      POSTGRES_DB: suzam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suzam -d suzam"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://suzam:suzam@postgres:5432/suzam?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  go-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://suzam:suzam@postgres:5432/suzam?sslmode=disable
      RABBITMQ_HOST: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - downloads:/app/downloads
      - output_data:/app/output-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  python-worker:
    build:
      context: ./scraper/scrap-spotify
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://suzam:suzam@postgres:5432/suzam?sslmode=disable
      RABBITMQ_HOST: rabbitmq
    volumes:
      - downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
  downloads:
  output_data:
